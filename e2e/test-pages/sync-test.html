<!DOCTYPE html>
<html><head><title>Sync Test</title>
<script src="polyfill-bundle.js"></script>
</head>
<body><div id="app"></div>
<script>
// Wait for polyfill to be ready by polling for navigator.graph
function checkReady() {
  if (typeof navigator !== 'undefined' && navigator.graph) {
    window.__ready = true;
  } else {
    setTimeout(checkReady, 50);
  }
}
checkReady();
</script>
</body></html>
